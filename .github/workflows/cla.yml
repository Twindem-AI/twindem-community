name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uses a dedicated PAT (repo scope) if you add a CLA_SIGNATURES_TOKEN
          # secret; otherwise falls back to the built-in GITHUB_TOKEN so the bot
          # works out of the box (same-repo signature storage).
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/Twindem-AI/twindem-community/blob/main/CLA.md"
          branch: "main"
          # Maintainers / bots that never need to sign.
          allowlist: __cla_test_nobody__
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thank you for your contribution. Before it can be merged, please read our [Contributor License Agreement](https://github.com/Twindem-AI/twindem-community/blob/main/CLA.md) and sign it by posting the comment below in this pull request."
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
